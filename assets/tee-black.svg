<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 750" preserveAspectRatio="xMidYMid meet">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f4f1ec"/>
      <stop offset="1" stop-color="#e8e3da"/>
    </linearGradient>
    <linearGradient id="tee" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1f1f1f"/>
      <stop offset="0.5" stop-color="#161616"/>
      <stop offset="1" stop-color="#0d0d0d"/>
    </linearGradient>
    <filter id="soft" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="0.6"/>
    </filter>
  </defs>
  <rect width="600" height="750" fill="url(#bg)"/>
  
  <!-- Subtle radial -->
  <circle cx="300" cy="320" r="280" fill="#fff" opacity="0.4"/>
  
  <!-- T-shirt -->
  <g transform="translate(300 380)">
    <!-- Shadow -->
    <ellipse cx="0" cy="270" rx="180" ry="14" fill="#000" opacity="0.12"/>
    
    <!-- Body -->
    <path d="M -150 -180 
             L -90 -210
             Q -45 -195 0 -195
             Q 45 -195 90 -210
             L 150 -180
             L 195 -110
             Q 198 -90 178 -85
             L 145 -100
             Q 140 30 152 250
             L -152 250
             Q -140 30 -145 -100
             L -178 -85
             Q -198 -90 -195 -110 Z" 
          fill="url(#tee)" filter="url(#soft)"/>
    
    <!-- Collar -->
    <path d="M -50 -210 Q 0 -195 50 -210 Q 45 -180 0 -178 Q -45 -180 -50 -210 Z" fill="#080808"/>
    
    <!-- Side seams -->
    <line x1="-145" y1="-100" x2="-152" y2="250" stroke="#2a2a2a" stroke-width="0.6" opacity="0.6"/>
    <line x1="145" y1="-100" x2="152" y2="250" stroke="#2a2a2a" stroke-width="0.6" opacity="0.6"/>
    
    <!-- ACR mini logo -->
    <g transform="translate(0 -50)">
      <text x="0" y="0" text-anchor="middle" font-family="serif" font-size="14" font-weight="700" fill="#c8341d" letter-spacing="3">ACR</text>
      <circle cx="28" cy="-3" r="1.8" fill="#c8341d"/>
    </g>
    
    <!-- Hem -->
    <line x1="-152" y1="240" x2="152" y2="240" stroke="#080808" stroke-width="0.8"/>
  </g>
  
  <!-- Tag in corner -->
  <text x="40" y="710" font-family="monospace" font-size="9" letter-spacing="2" fill="#0a0a0a" opacity="0.5">ACR / 100% COTTON</text>
  <text x="560" y="710" text-anchor="end" font-family="monospace" font-size="9" letter-spacing="2" fill="#0a0a0a" opacity="0.5">CLASSIC ◦ BLACK</text>
</svg>
