<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1000" preserveAspectRatio="xMidYMax slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1a1a1a"/>
      <stop offset="1" stop-color="#0a0a0a"/>
    </linearGradient>
    <linearGradient id="shirt" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2a2a2a"/>
      <stop offset="0.5" stop-color="#1f1f1f"/>
      <stop offset="1" stop-color="#151515"/>
    </linearGradient>
    <radialGradient id="spot" cx="0.35" cy="0.2" r="0.7">
      <stop offset="0" stop-color="#c8341d" stop-opacity="0.25"/>
      <stop offset="1" stop-color="transparent"/>
    </radialGradient>
    <linearGradient id="skin" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3a2e28"/>
      <stop offset="1" stop-color="#251c18"/>
    </linearGradient>
  </defs>
  <rect width="800" height="1000" fill="url(#bg)"/>
  <rect width="800" height="1000" fill="url(#spot)"/>
  
  <!-- Figure -->
  <g>
    <!-- Pants/lower body -->
    <path d="M 280 700 L 340 700 L 360 1000 L 270 1000 Z" fill="#0c0c0c"/>
    <path d="M 340 700 L 480 700 L 530 1000 L 440 1000 Z" fill="#0c0c0c"/>
    
    <!-- T-shirt body -->
    <path d="M 250 380 Q 240 560 260 700 L 480 700 Q 500 560 490 380 L 430 340 Q 380 360 320 340 Z" fill="url(#shirt)"/>
    
    <!-- Sleeves -->
    <path d="M 250 380 Q 200 400 180 460 Q 175 480 195 490 Q 230 470 260 460 Z" fill="url(#shirt)"/>
    <path d="M 490 380 Q 540 400 560 460 Q 565 480 545 490 Q 510 470 480 460 Z" fill="url(#shirt)"/>
    
    <!-- Collar -->
    <path d="M 320 340 Q 370 360 420 340 Q 410 360 370 365 Q 330 360 320 340 Z" fill="#0a0a0a"/>
    
    <!-- Subtle shirt highlight -->
    <path d="M 270 400 Q 280 550 300 690" stroke="#3a3a3a" stroke-width="0.8" fill="none" opacity="0.5"/>
    
    <!-- Tiny ACR logo on chest -->
    <text x="370" y="450" text-anchor="middle" font-family="serif" font-size="11" font-weight="600" fill="#c8341d" opacity="0.85" letter-spacing="2">ACR</text>
    <circle cx="395" cy="447" r="1.5" fill="#c8341d" opacity="0.85"/>
    
    <!-- Neck -->
    <path d="M 345 280 L 395 280 L 400 345 L 340 345 Z" fill="url(#skin)"/>
    
    <!-- Head -->
    <ellipse cx="370" cy="220" rx="62" ry="78" fill="url(#skin)"/>
    
    <!-- Hair shadow / cap -->
    <path d="M 308 200 Q 310 145 370 130 Q 430 145 432 200 Q 432 175 370 165 Q 310 175 308 200 Z" fill="#0a0a0a"/>
    
    <!-- Subtle face shadow -->
    <path d="M 315 230 Q 340 290 370 295 Q 400 290 425 230" stroke="#1a1410" stroke-width="0.5" fill="none" opacity="0.4"/>
  </g>
  
  <!-- Floor reflection / grain overlay -->
  <rect width="800" height="1000" fill="url(#spot)" opacity="0.3"/>
</svg>
