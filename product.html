<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ACR Classic Cotton Tee — ACR</title>
  <meta name="description" content="The ACR Classic Cotton Tee. 100% cotton. White. Sizes S, M, L. $24.99." />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body data-page="tees">

  <div data-include="header"></div>

  <main class="container" style="padding: 60px 0 100px;" id="pdp-root">
    <!-- rendered by JS -->
  </main>

  <div data-include="footer"></div>
  <div data-include="drawer"></div>

  <script src="js/products.js"></script>
  <script src="js/partials.js"></script>
  <script src="js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const params = new URLSearchParams(window.location.search);
      const id = params.get('id') || (window.PRODUCTS && window.PRODUCTS[0] && window.PRODUCTS[0].id);
      const p = (window.PRODUCTS || []).find(x => x.id === id);
      const root = document.getElementById('pdp-root');
      if (!p || !root) {
        if (root) root.innerHTML = '<p style="text-align:center;padding:80px 0;">Product not found.</p>';
        return;
      }

      document.title = `${p.name} — ACR`;

      root.innerHTML = `
        <div class="pdp-grid">
          <!-- GALLERY -->
          <div class="pdp-gallery">
            <div class="pdp-main-img" style="background-image:url('${p.image}'); background-size:contain; background-repeat:no-repeat; background-position:center; background-color:#faf8f4;"></div>
          </div>

          <!-- INFO -->
          <div class="pdp-info">
            <span class="eyebrow">— ${p.collection}</span>
            <h1 class="pdp-title">${p.name}</h1>
            <div class="pdp-price">${fmt(p.price)}</div>

            <p class="pdp-desc">${p.description}</p>

            <div class="pdp-section">
              <div class="pdp-label">Color — <strong>${p.colors[0]}</strong></div>
              <div class="color-swatches">
                ${p.colors.map(c => `<button class="color-swatch active" data-color="${c}" style="background:#fff; border:1px solid #ccc;" title="${c}"></button>`).join('')}
              </div>
            </div>

            <div class="pdp-section">
              <div class="pdp-label">Size <span class="pdp-size-help">Size guide →</span></div>
              <div class="size-options" data-size-options>
                ${p.sizes.map((s, i) => `<button class="size-btn ${i === 1 ? 'active' : ''}" data-size="${s}">${s}</button>`).join('')}
              </div>
            </div>

            <div class="pdp-section pdp-qty-row">
              <div class="qty-control">
                <button data-qty="-1" type="button">−</button>
                <span data-qty-value>1</span>
                <button data-qty="1" type="button">+</button>
              </div>
            </div>

            <div class="pdp-actions">
              <button class="btn btn-primary btn-block" id="add-to-cart">Add to Cart — ${fmt(p.price)}</button>
              <button class="btn btn-outline btn-block" id="buy-now">Buy Now</button>
            </div>

            <div class="pdp-perks">
              <div class="perk">
                <strong>Free shipping</strong>
                <span>On orders over $75</span>
              </div>
              <div class="perk">
                <strong>30-day returns</strong>
                <span>Easy and friendly</span>
              </div>
              <div class="perk">
                <strong>Secure checkout</strong>
                <span>SSL encrypted</span>
              </div>
            </div>

            <details class="pdp-accordion" open>
              <summary>Details</summary>
              <ul>
                <li>${p.material}</li>
                <li>Classic fit</li>
                <li>Crew neck, short sleeve</li>
                <li>Small ACR chest logo</li>
                <li>Available in sizes ${p.sizes.join(', ')}</li>
              </ul>
            </details>

            <details class="pdp-accordion">
              <summary>Care</summary>
              <ul>
                <li>Machine wash cold</li>
                <li>Tumble dry low</li>
                <li>Do not bleach</li>
                <li>Iron inside out if needed</li>
              </ul>
            </details>

            <details class="pdp-accordion">
              <summary>Shipping & Returns</summary>
              <ul>
                <li>Standard shipping: 3–5 business days</li>
                <li>Free over $75</li>
                <li>30-day returns on unworn items</li>
              </ul>
            </details>
          </div>
        </div>
      `;

      // Size selection
      let selectedSize = p.sizes[1] || p.sizes[0];
      root.querySelectorAll('[data-size]').forEach(btn => {
        btn.addEventListener('click', () => {
          root.querySelectorAll('[data-size]').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          selectedSize = btn.dataset.size;
        });
      });

      // Qty
      let qty = 1;
      const qtyVal = root.querySelector('[data-qty-value]');
      root.querySelectorAll('[data-qty]').forEach(btn => {
        btn.addEventListener('click', () => {
          qty = Math.max(1, qty + parseInt(btn.dataset.qty, 10));
          qtyVal.textContent = qty;
        });
      });

      // Add to cart
      root.querySelector('#add-to-cart').addEventListener('click', () => {
        addToCart(p.id, { size: selectedSize, qty });
        openDrawer && openDrawer();
      });
      root.querySelector('#buy-now').addEventListener('click', () => {
        addToCart(p.id, { size: selectedSize, qty });
        window.location.href = 'cart.html';
      });
    });
  </script>
</body>
</html>
